name: MoonWheelKit Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  moonbit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [native, js, wasm, wasm-gc]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Toolchain
        run: moon version --all

      - name: Format check
        shell: pwsh
        run: |
          $help = moon fmt --help | Out-String
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($help -match '--deny-warn') { moon fmt --deny-warn } else { moon fmt --check }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Compile
        run: moon check --target ${{ matrix.target }}

      - name: Build
        run: moon build --target ${{ matrix.target }}

      - name: Test
        run: moon test --target ${{ matrix.target }}

      - name: Run scheduler demo
        if: matrix.target == 'native'
        run: moon run cmd/main --target js

      - name: Run deterministic workload
        if: matrix.target == 'native'
        run: moon run bench/main --target js

      - name: Verify generated public API
        if: matrix.target == 'native'
        shell: pwsh
        run: |
          $help = moon info --help | Out-String
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($help -match '--deny-warn') { moon info --deny-warn } else { moon info; git diff --exit-code -- '*.mbti' }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
