name: MoonWheelKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  moonbit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [native, js, wasm, wasm-gc]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Format check
        run: moon fmt --check

      - name: Compile
        run: moon check --target ${{ matrix.target }}

      - name: Test
        run: moon test --target ${{ matrix.target }}

      - name: Run scheduler demo
        if: matrix.target == 'native'
        run: moon run cmd/main --target js

      - name: Run deterministic workload
        if: matrix.target == 'native'
        run: moon run bench/main --target js

      - name: Verify generated public API
        if: matrix.target == 'native'
        run: |
          moon info
          git diff --exit-code -- '*.mbti'
